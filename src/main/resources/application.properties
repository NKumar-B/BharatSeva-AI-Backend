spring.application.name=api
# MySQL Connection parameters matching ER design
spring.datasource.url=jdbc:mysql://localhost:3306/bharatseva_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root

# Hibernate JPA parameters to safely auto-generate missing tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect