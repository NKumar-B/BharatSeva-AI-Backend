spring.application.name=api

# These are for the Database (PostgreSQL)
# We use the environment variable provided by Render
spring.datasource.url=${DATABASE_URL}

# Hibernate JPA parameters to safely auto-generate missing tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# IMPORTANT: Remove the MySQL dialect! 
# Hibernate will auto-detect PostgreSQL.